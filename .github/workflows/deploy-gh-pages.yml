name: Flutter Web → GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Mapăm secretele aici pentru a fi disponibile global în job
  FIREBASE_API_KEY_WEB: ${{ secrets.FIREBASE_API_KEY_WEB }}
  FIREBASE_API_KEY_ANDROID: ${{ secrets.FIREBASE_API_KEY_ANDROID }}
  FIREBASE_API_KEY_IOS: ${{ secrets.FIREBASE_API_KEY_IOS }}
  FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
  FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
  FIREBASE_APP_ID_WEB: ${{ secrets.FIREBASE_APP_ID_WEB }}
  FIREBASE_APP_ID_WINDOWS: ${{ secrets.FIREBASE_APP_ID_WINDOWS }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_IOS_BUNDLE_ID: ${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
  FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
  GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
  ASTRONOMY_API_APP_ID: ${{ secrets.ASTRONOMY_API_APP_ID }}
  ASTRONOMY_API_APP_SECRET: ${{ secrets.ASTRONOMY_API_APP_SECRET }}
  OAUTH_CALLBACK_SCHEME: ${{ secrets.OAUTH_CALLBACK_SCHEME }}
  GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
  GOOGLE_DESKTOP_CLIENT_SECRET: ${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify required build secrets
        run: |
          missing=0
          vars=("FIREBASE_API_KEY_WEB" "FIREBASE_APP_ID_WEB" "FIREBASE_MESSAGING_SENDER_ID" "FIREBASE_PROJECT_ID" "FIREBASE_AUTH_DOMAIN" "FIREBASE_DB_URL" "GOOGLE_WEB_CLIENT_ID")
          for var_name in "${vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Secret $var_name is missing or empty"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then exit 1; fi

      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --base-href="/astrolab/" \
            --dart-define=FIREBASE_API_KEY_WEB=$FIREBASE_API_KEY_WEB \
            --dart-define=FIREBASE_API_KEY_ANDROID=$FIREBASE_API_KEY_ANDROID \
            --dart-define=FIREBASE_API_KEY_IOS=$FIREBASE_API_KEY_IOS \
            --dart-define=FIREBASE_APP_ID_ANDROID=$FIREBASE_APP_ID_ANDROID \
            --dart-define=FIREBASE_APP_ID_IOS=$FIREBASE_APP_ID_IOS \
            --dart-define=FIREBASE_APP_ID_WEB=$FIREBASE_APP_ID_WEB \
            --dart-define=FIREBASE_APP_ID_WINDOWS=$FIREBASE_APP_ID_WINDOWS \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID \
            --dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID \
            --dart-define=FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET \
            --dart-define=FIREBASE_AUTH_DOMAIN=$FIREBASE_AUTH_DOMAIN \
            --dart-define=FIREBASE_IOS_BUNDLE_ID=$FIREBASE_IOS_BUNDLE_ID \
            --dart-define=FIREBASE_DB_URL=$FIREBASE_DB_URL \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=ASTRONOMY_API_APP_ID=$ASTRONOMY_API_APP_ID \
            --dart-define=ASTRONOMY_API_APP_SECRET=$ASTRONOMY_API_APP_SECRET \
            --dart-define=OAUTH_CALLBACK_SCHEME=$OAUTH_CALLBACK_SCHEME \
            --dart-define=GOOGLE_DESKTOP_CLIENT_ID=$GOOGLE_DESKTOP_CLIENT_ID \
            --dart-define=GOOGLE_DESKTOP_CLIENT_SECRET=$GOOGLE_DESKTOP_CLIENT_SECRET \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4