name: astrolab
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  model_viewer_plus: ^1.10.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  firebase_core: ^4.7.0
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.0
  crypto: ^3.0.3
  googleapis_auth: ^1.6.0
  url_launcher: ^6.3.0
  flutter_math_fork: ^0.7.4
  pdf: ^3.12.0
  printing: ^5.14.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/astrolab_planet.png
    - assets/curriculum/
    - assets/certificates/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/astrolab_planet.png"
  web:
    generate: true
    image_path: "assets/images/astrolab_planet.png"
  windows:
    generate: true
    image_path: "assets/images/astrolab_planet.png"
    icon_size: 48